<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Broadsides</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas" aria-label="Broadsides battle area"></canvas>

    <div id="hud" aria-live="polite">
      <div id="wind-indicator">
        <div id="wind-arrow">
          <svg viewBox="0 0 40 60" width="40" height="60" aria-hidden="true">
            <rect x="16.5" y="22" width="7" height="32" rx="2" fill="#99d8ff" />
            <polygon points="20,2 36,26 4,26" fill="#99d8ff" />
          </svg>
        </div>
        <div id="wind-label">WIND</div>
      </div>

      <div id="fleet-british" class="fleet-status"></div>
      <div id="fleet-franco" class="fleet-status"></div>

      <div id="hint">
        Click to place the <b>Baton of Command</b> by a ship &nbsp;•&nbsp; drag from it to set course
        &nbsp;•&nbsp; tap the bubble's sail / shot buttons to trim &nbsp;•&nbsp; click elsewhere to move the baton
      </div>

      <div id="banner"></div>

      <!-- Start screen — shown during the Setup phase -->
      <div id="setup-overlay">
        <div id="game-title">BROADSIDES</div>
        <div id="game-subtitle">Age of Sail</div>
        <div id="opponent-label">Choose your opponent</div>
        <div id="opponent-select" role="group" aria-label="Choose your opponent">
          <button id="persona-standard" class="opponent-btn" type="button">
            <span class="opp-name">Standard</span>
            <span class="opp-desc">A balanced foe</span>
          </button>
          <button id="persona-turtle" class="opponent-btn" type="button">
            <span class="opp-name">Turtle</span>
            <span class="opp-desc">Holds station, guns blazing</span>
          </button>
          <button id="persona-giga" class="opponent-btn" type="button">
            <span class="opp-name">Giga-brain</span>
            <span class="opp-desc">Manoeuvres to rake</span>
          </button>
          <button id="opponent-human" class="opponent-btn" type="button">
            <span class="opp-name">2 Players</span>
            <span class="opp-desc">Human vs human</span>
          </button>
        </div>
        <div id="setup-status">Place your command piece to begin…</div>
      </div>
    </div>

    <div id="dev-controls">
      <button id="reset-button" type="button">Rematch</button>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
